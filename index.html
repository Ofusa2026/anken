<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>参考様式第１－６号 雇用条件書</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'MS Mincho','Yu Mincho','Hiragino Mincho ProN',serif;background:#ccc;font-size:10pt;}
.app-bar{position:sticky;top:0;z-index:100;background:#1a2e4a;color:white;display:flex;align-items:center;justify-content:space-between;padding:7px 12px;}
.app-bar-title{font-size:12px;font-family:sans-serif;}
.ver{font-size:9px;color:#8ab;font-family:sans-serif;}
.bar-btns{display:flex;gap:6px;}
.btn{padding:4px 12px;border:none;border-radius:3px;cursor:pointer;font-size:11px;font-family:sans-serif;font-weight:700;}
.btn-save{background:#16a34a;color:white;}
.btn-print{background:#7c3aed;color:white;}
.main{display:flex;height:calc(100vh - 38px);overflow:hidden;}
.fp{width:290px;flex-shrink:0;overflow-y:auto;background:white;border-right:1px solid #bbb;}
.fp-case{padding:8px;background:#f5f5f5;border-bottom:1px solid #ccc;font-family:sans-serif;}
.fp-case label{font-size:9px;font-weight:700;color:#555;display:block;margin-bottom:2px;}
.fp-case select{width:100%;padding:4px;border:1px solid #bbb;border-radius:3px;font-size:11px;}
.fp-inner{padding:8px;}
.fs{margin-bottom:10px;}
.fs-title{background:#333;color:white;font-size:9px;padding:2px 6px;margin-bottom:5px;font-family:sans-serif;}
.fg{margin-bottom:4px;}
.fg label{display:block;font-size:8.5px;color:#555;font-family:sans-serif;margin-bottom:1px;}
.fg input,.fg select,.fg textarea{width:100%;padding:3px 5px;border:1px solid #bbb;border-radius:2px;font-size:10px;font-family:sans-serif;}
.fg textarea{resize:vertical;min-height:36px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;}
.pp{flex:1;overflow-y:auto;background:#e8e8e8;padding:12px;}

/* ===== 帳票 ===== */
.doc{background:white;max-width:820px;margin:0 auto;padding:12mm 14mm 14mm;box-shadow:0 2px 8px rgba(0,0,0,.15);font-family:'MS Mincho','Yu Mincho','Hiragino Mincho ProN',serif;font-size:8.5pt;line-height:1.6;color:#000;}
.doc *{font-family:'MS Mincho','Yu Mincho','Hiragino Mincho ProN',serif;}

/* フィールド（黄色） */
.f{background:#ffff00;display:inline;padding:0 2px;}
/* チェックボックス */
.cb{display:inline-block;width:10px;height:10px;border:1px solid #333;text-align:center;line-height:10px;font-size:8pt;vertical-align:middle;margin:0 1px;}
/* インドネシア語 */
.id{font-size:7.5pt;color:#333;}
/* セクション見出し */
.sec1{font-size:9pt;font-weight:bold;margin:8px 0 3px;}
.sec2{font-size:8.5pt;font-weight:bold;margin:4px 0 2px;margin-left:12px;}
/* テーブル */
.tbl{width:100%;border-collapse:collapse;font-size:7.5pt;margin:3px 0;}
.tbl td,.tbl th{border:1px solid #666;padding:2px 4px;vertical-align:top;}
.tbl .k{white-space:nowrap;font-weight:normal;}
/* 枠線 */
.box{border:1px solid #666;padding:5px 8px;margin:4px 0;}
/* 印刷 */
@media print{
  .app-bar,.fp{display:none!important;}
  .main{height:auto;}
  .pp{background:white;padding:0;overflow:visible;}
  .doc{box-shadow:none;margin:0;max-width:none;}
  @page{size:A4;margin:0;}
}
</style>
</head>

    (c||[]).forEach(r=>{const o=document.createElement('option');o.value=r.id;o.textContent=(r.applicant_name||'')+'　('+(r.company_name||'')+')';sel.appendChild(o);});

}
